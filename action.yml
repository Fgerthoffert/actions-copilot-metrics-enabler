name: Copilot Metrics Enabler
description:
  A GitHub Action that retrieves GitHub Copilot usage metrics from the API and
  organizes them to facilitate analysis and enablement.
author: Francois Gerthoffert

branding:
  icon: activity
  color: green

# Define your inputs here.
inputs:
  github_token:
    description: GitHub token with read access to the project and its issues/PRs
    required: true
  github_org:
    description: GitHub organization to fetch Copilot metrics for
    required: true
  path:
    description:
      Local path for storing source API data (daily JSON files). If none
      provided, a temporary directory will be used and passed as output.
    default: ''
    required: false
  report_path:
    description:
      Local path for storing transforms and report files. When set, transforms
      (NDJSON) and Markdown reports are written here instead of under `path`.
      This allows multiple runs with different user filters to share the same
      source data while writing reports to separate locations.
    default: ''
    required: false
  summary_report:
    description:
      Set to 'true' to generate a summary report in the GitHub Actions job
      summary.
    default: 'false'
    required: false
  include_users:
    description: >-
      Comma-separated list of user logins to include in reports. When set, only
      these users will appear in the transformed data and generated reports.
      Leave empty to include all users.
    default: ''
    required: false
  exclude_users:
    description: >-
      Comma-separated list of user logins to exclude from reports. These users
      will be removed from the transformed data and generated reports. Ignored
      if include_users is set.
    default: ''
    required: false
  lookback_days:
    description: Number of days to look back in history for missing data.
    default: '100'
    required: false

# Define your outputs here.
outputs:
  path:
    description:
      The path where JSON files are stored or a temporary directory if none was
      provided.

runs:
  using: node24
  main: dist/index.js
